# Docker Compose com Portas Personalizadas
# n.Gabi - Chat Multi-Agente

version: '3.8'

services:
  frontend:
    build: ./frontend
    container_name: ngabi-frontend
    ports:
      - "8080:3000"  # Porta externa 8080, interna 3000
    environment:
      - VITE_API_URL=http://localhost:9000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ngabi-network

  backend:
    build: ./backend
    container_name: ngabi-backend
    ports:
      - "9000:8000"  # Porta externa 9000, interna 8000
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - REDIS_URL=redis://ngabi-redis:6379
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    networks:
      - ngabi-network

  redis:
    image: redis:7-alpine
    container_name: ngabi-redis
    ports:
      - "6380:6379"  # Porta externa 6380, interna 6379
    networks:
      - ngabi-network

networks:
  ngabi-network:
    driver: bridge 