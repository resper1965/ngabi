groups:
  - name: chat_app_recording_rules
    rules:
      # QPS (Queries Per Second) por endpoint
      - record: chat_app:http_requests_per_second
        expr: rate(http_requests_total[1m])
        labels:
          service: chat-app
      
      # QPS por tenant
      - record: chat_app:http_requests_per_second_by_tenant
        expr: rate(http_requests_total[1m])
        labels:
          service: chat-app
      
      # Latência média por endpoint
      - record: chat_app:http_request_duration_seconds_avg
        expr: rate(http_request_duration_seconds_sum[5m]) / rate(http_request_duration_seconds_count[5m])
        labels:
          service: chat-app
      
      # Latência p95 por endpoint
      - record: chat_app:http_request_duration_seconds_p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))
        labels:
          service: chat-app
      
      # Latência p99 por endpoint
      - record: chat_app:http_request_duration_seconds_p99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))
        labels:
          service: chat-app
      
      # Taxa de erro por endpoint
      - record: chat_app:http_error_rate
        expr: rate(http_requests_total{status_code=~"4..|5.."}[5m]) / rate(http_requests_total[5m])
        labels:
          service: chat-app
      
      # Taxa de sucesso por endpoint
      - record: chat_app:http_success_rate
        expr: rate(http_requests_total{status_code=~"2..|3.."}[5m]) / rate(http_requests_total[5m])
        labels:
          service: chat-app
      
      # Cache hit rate
      - record: chat_app:cache_hit_rate
        expr: rate(cache_hits_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]))
        labels:
          service: chat-app
      
      # Cache miss rate
      - record: chat_app:cache_miss_rate
        expr: rate(cache_misses_total[5m]) / (rate(cache_hits_total[5m]) + rate(cache_misses_total[5m]))
        labels:
          service: chat-app
      
      # Rate limit violation rate
      - record: chat_app:rate_limit_violation_rate
        expr: rate(rate_limit_exceeded_total[5m]) / (rate(rate_limit_hits_total[5m]) + rate(rate_limit_exceeded_total[5m]))
        labels:
          service: chat-app
      
      # Chat response time average
      - record: chat_app:chat_response_time_seconds_avg
        expr: rate(chat_response_time_seconds_sum[5m]) / rate(chat_response_time_seconds_count[5m])
        labels:
          service: chat-app
      
      # Chat messages per minute
      - record: chat_app:chat_messages_per_minute
        expr: rate(chat_messages_total[1m]) * 60
        labels:
          service: chat-app
      
      # Active users (últimos 5 minutos)
      - record: chat_app:active_users_5m
        expr: count by (tenant_id) (rate(http_requests_total[5m]) > 0)
        labels:
          service: chat-app
      
      # Throughput por endpoint
      - record: chat_app:throughput_requests_per_second
        expr: sum by (endpoint) (rate(http_requests_total[1m]))
        labels:
          service: chat-app
      
      # Uso de memória em MB
      - record: chat_app:memory_usage_mb
        expr: memory_usage_bytes / 1024 / 1024
        labels:
          service: chat-app
      
      # Tamanho médio de requisição em KB
      - record: chat_app:request_size_kb_avg
        expr: rate(http_request_size_bytes_sum[5m]) / rate(http_request_size_bytes_count[5m]) / 1024
        labels:
          service: chat-app
      
      # Tamanho médio de resposta em KB
      - record: chat_app:response_size_kb_avg
        expr: rate(http_response_size_bytes_sum[5m]) / rate(http_response_size_bytes_count[5m]) / 1024
        labels:
          service: chat-app 