apiVersion: 1

providers:
  - name: 'Chat App Alerts'
    orgId: 1
    folder: 'Chat App'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/alerting

alerting:
  contactPoints:
    - name: 'Slack Alerts'
      receivers:
        - uid: slack_alerts
          type: slack
          settings:
            url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK_URL'
            title: '🚨 Chat App Alert'
            text: '{{ .CommonAnnotations.summary }}\n\n{{ .CommonAnnotations.description }}'
            icon_emoji: ':warning:'
            username: 'Chat App Monitor'
            channel: '#alerts'
            mentionChannel: 'here'
            mentionUsers: 'U1234567890'  # IDs dos usuários para mencionar
            token: 'YOUR_SLACK_BOT_TOKEN'  # Opcional, para funcionalidades avançadas

  policies:
    - orgId: 1
      receiver: slack_alerts
      group_by: ['alertname', 'tenant_id', 'endpoint']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - receiver: slack_alerts
          group_wait: 10s
          group_interval: 1m
          repeat_interval: 1h
          matchers:
            - severity = critical
        - receiver: slack_alerts
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          matchers:
            - severity = warning

  rules:
    - name: 'Chat Request Latency High'
      condition: |
        avg(
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket{endpoint=~"/chat.*"}[5m])
          )
        ) > 2
      for: 2m
      labels:
        severity: critical
        service: chat-app
        alert_type: latency
      annotations:
        summary: 'Chat request latency is too high'
        description: |
          The 95th percentile latency for chat requests is {{ $value }}s, which exceeds the 2s threshold.
          
          **Affected endpoints:**
          {{ range query "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~'/chat.*'}[5m])) > 2" }}
          - {{ .Labels.endpoint }}: {{ .Value }}s
          {{ end }}
          
          **Top tenants by latency:**
          {{ range query "topk(5, histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~'/chat.*'}[5m])))" }}
          - {{ .Labels.tenant_id }}: {{ .Value }}s
          {{ end }}
          
          **Recent errors:**
          {{ range query "rate(http_requests_total{endpoint=~'/chat.*', status_code=~'5..'}[5m])" }}
          - {{ .Labels.endpoint }}: {{ .Value }} errors/s
          {{ end }}

    - name: 'Chat Error Rate High'
      condition: |
        sum(
          rate(http_requests_total{endpoint=~"/chat.*", status_code=~"4..|5.."}[5m])
        ) / sum(
          rate(http_requests_total{endpoint=~"/chat.*"}[5m])
        ) > 0.05
      for: 1m
      labels:
        severity: critical
        service: chat-app
        alert_type: error_rate
      annotations:
        summary: 'Chat error rate is too high'
        description: |
          The error rate for chat requests is {{ $value | humanizePercentage }}, which exceeds the 5% threshold.
          
          **Error breakdown by endpoint:**
          {{ range query "rate(http_requests_total{endpoint=~'/chat.*', status_code=~'4..|5..'}[5m])" }}
          - {{ .Labels.endpoint }}: {{ .Value }} errors/s
          {{ end }}
          
          **Error breakdown by status code:**
          {{ range query "sum by (status_code) (rate(http_requests_total{endpoint=~'/chat.*', status_code=~'4..|5..'}[5m]))" }}
          - {{ .Labels.status_code }}: {{ .Value }} errors/s
          {{ end }}
          
          **Top tenants with errors:**
          {{ range query "topk(5, sum by (tenant_id) (rate(http_requests_total{endpoint=~'/chat.*', status_code=~'4..|5..'}[5m])))" }}
          - {{ .Labels.tenant_id }}: {{ .Value }} errors/s
          {{ end }}

    - name: 'Chat Request Latency Warning'
      condition: |
        avg(
          histogram_quantile(0.95, 
            rate(http_request_duration_seconds_bucket{endpoint=~"/chat.*"}[5m])
          )
        ) > 1.5
      for: 5m
      labels:
        severity: warning
        service: chat-app
        alert_type: latency
      annotations:
        summary: 'Chat request latency is elevated'
        description: |
          The 95th percentile latency for chat requests is {{ $value }}s, which is approaching the 2s threshold.
          
          **Endpoints with elevated latency:**
          {{ range query "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{endpoint=~'/chat.*'}[5m])) > 1.5" }}
          - {{ .Labels.endpoint }}: {{ .Value }}s
          {{ end }}

    - name: 'Chat Error Rate Warning'
      condition: |
        sum(
          rate(http_requests_total{endpoint=~"/chat.*", status_code=~"4..|5.."}[5m])
        ) / sum(
          rate(http_requests_total{endpoint=~"/chat.*"}[5m])
        ) > 0.03
      for: 3m
      labels:
        severity: warning
        service: chat-app
        alert_type: error_rate
      annotations:
        summary: 'Chat error rate is elevated'
        description: |
          The error rate for chat requests is {{ $value | humanizePercentage }}, which is approaching the 5% threshold.
          
          **Current error rate by endpoint:**
          {{ range query "rate(http_requests_total{endpoint=~'/chat.*', status_code=~'4..|5..'}[5m])" }}
          - {{ .Labels.endpoint }}: {{ .Value }} errors/s
          {{ end }}

    - name: 'Chat QPS High'
      condition: |
        sum(
          rate(http_requests_total{endpoint=~"/chat.*"}[1m])
        ) > 100
      for: 2m
      labels:
        severity: warning
        service: chat-app
        alert_type: throughput
      annotations:
        summary: 'Chat QPS is very high'
        description: |
          The chat application is receiving {{ $value }} requests per second, which may indicate high load.
          
          **QPS by endpoint:**
          {{ range query "rate(http_requests_total{endpoint=~'/chat.*'}[1m])" }}
          - {{ .Labels.endpoint }}: {{ .Value }} req/s
          {{ end }}
          
          **Top tenants by QPS:**
          {{ range query "topk(5, sum by (tenant_id) (rate(http_requests_total{endpoint=~'/chat.*'}[1m])))" }}
          - {{ .Labels.tenant_id }}: {{ .Value }} req/s
          {{ end }}

    - name: 'Cache Hit Rate Low'
      condition: |
        rate(cache_hits_total{cache_type="redis"}[5m]) / (
          rate(cache_hits_total{cache_type="redis"}[5m]) + 
          rate(cache_misses_total{cache_type="redis"}[5m])
        ) < 0.8
      for: 5m
      labels:
        severity: warning
        service: chat-app
        alert_type: cache
      annotations:
        summary: 'Cache hit rate is low'
        description: |
          The Redis cache hit rate is {{ $value | humanizePercentage }}, which is below the 80% threshold.
          
          **Cache performance:**
          - Hit rate: {{ $value | humanizePercentage }}
          - Hits: {{ query "rate(cache_hits_total{cache_type='redis'}[5m])" | first | value }} hits/s
          - Misses: {{ query "rate(cache_misses_total{cache_type='redis'}[5m])" | first | value }} misses/s

    - name: 'Rate Limit Violations High'
      condition: |
        sum(
          rate(rate_limit_exceeded_total{endpoint=~"/chat.*"}[5m])
        ) > 10
      for: 2m
      labels:
        severity: warning
        service: chat-app
        alert_type: rate_limit
      annotations:
        summary: 'High rate limit violations'
        description: |
          There are {{ $value }} rate limit violations per second, indicating potential abuse or misconfiguration.
          
          **Violations by endpoint:**
          {{ range query "rate(rate_limit_exceeded_total{endpoint=~'/chat.*'}[5m])" }}
          - {{ .Labels.endpoint }}: {{ .Value }} violations/s
          {{ end }}
          
          **Top tenants with violations:**
          {{ range query "topk(5, sum by (tenant_id) (rate(rate_limit_exceeded_total{endpoint=~'/chat.*'}[5m])))" }}
          - {{ .Labels.tenant_id }}: {{ .Value }} violations/s
          {{ end }}

    - name: 'Memory Usage High'
      condition: |
        memory_usage_bytes{type="heap"} / 1024 / 1024 / 1024 > 2
      for: 5m
      labels:
        severity: warning
        service: chat-app
        alert_type: resource
      annotations:
        summary: 'Memory usage is high'
        description: |
          The application is using {{ $value }} GB of memory, which is above the 2GB threshold.
          
          **Memory breakdown:**
          - Heap: {{ query "memory_usage_bytes{type='heap'}" | first | value | humanize1024 }}B
          - Total: {{ query "memory_usage_bytes{type='total'}" | first | value | humanize1024 }}B

    - name: 'Active Connections High'
      condition: |
        active_connections{connection_type="tcp"} > 1000
      for: 2m
      labels:
        severity: warning
        service: chat-app
        alert_type: resource
      annotations:
        summary: 'High number of active connections'
        description: |
          There are {{ $value }} active TCP connections, which may indicate high load or connection leaks.
          
          **Connection breakdown:**
          {{ range query "active_connections" }}
          - {{ .Labels.connection_type }}: {{ .Value }} connections
          {{ end }}

# Configuração de templates para mensagens personalizadas
templates:
  - name: 'slack_message_template'
    template: |
      {{ define "slack_message" }}
      🚨 **{{ .CommonLabels.alertname }}**
      
      **Severity:** {{ .CommonLabels.severity }}
      **Service:** {{ .CommonLabels.service }}
      
      {{ .CommonAnnotations.description }}
      
      **Affected Resources:**
      {{ range .Alerts }}
      - {{ .Labels.endpoint }} ({{ .Labels.tenant_id }})
      {{ end }}
      
      **Time:** {{ .StartsAt | since }}
      
      <{{ .GeneratorURL }}|View in Grafana>
      {{ end }}

# Configuração de notificações adicionais
notifications:
  - name: 'Email Alerts'
    type: email
    settings:
      addresses: 'admin@company.com,ops@company.com'
      subject: 'Chat App Alert: {{ .CommonLabels.alertname }}'
      body: |
        Alert: {{ .CommonLabels.alertname }}
        Severity: {{ .CommonLabels.severity }}
        
        {{ .CommonAnnotations.description }}
        
        Time: {{ .StartsAt }}
        Duration: {{ .EndsAt | sub .StartsAt }}

  - name: 'PagerDuty Alerts'
    type: pagerduty
    settings:
      routing_key: 'YOUR_PAGERDUTY_ROUTING_KEY'
      severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
      description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
      details: |
        {{ .CommonAnnotations.description }}
        
        **Labels:**
        {{ range $key, $value := .CommonLabels }}
        - {{ $key }}: {{ $value }}
        {{ end }}

# Configuração de silenciamento
silences:
  - matchers:
      - name: alertname
        value: 'Chat Request Latency Warning'
        isRegex: false
    startsAt: '2024-01-01T00:00:00Z'
    endsAt: '2024-12-31T23:59:59Z'
    createdBy: 'admin'
    comment: 'Silence warning alerts during maintenance windows'

# Configuração de agrupamento de alertas
grouping:
  - name: 'chat_latency_alerts'
    matchers:
      - alert_type = latency
    group_by: ['tenant_id', 'endpoint']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h

  - name: 'chat_error_alerts'
    matchers:
      - alert_type = error_rate
    group_by: ['tenant_id', 'endpoint']
    group_wait: 10s
    group_interval: 2m
    repeat_interval: 30m

# Configuração de escalação
escalation:
  - name: 'chat_critical_alerts'
    matchers:
      - severity = critical
    escalation_chain:
      - delay: 5m
        receiver: 'slack_alerts'
      - delay: 15m
        receiver: 'pagerduty_alerts'
      - delay: 30m
        receiver: 'email_alerts' 