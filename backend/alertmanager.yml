global:
  resolve_timeout: 5m
  slack_api_url: 'https://hooks.slack.com/services/YOUR_SLACK_WEBHOOK_URL'

route:
  group_by: ['alertname', 'tenant_id', 'endpoint']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'slack_alerts'
  routes:
    - match:
        severity: critical
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      receiver: 'slack_critical'
    - match:
        severity: warning
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'slack_warning'

receivers:
  - name: 'slack_alerts'
    slack_configs:
      - channel: '#alerts'
        title: '🚨 Chat App Alert'
        text: |
          **Alert:** {{ .CommonLabels.alertname }}
          **Severity:** {{ .CommonLabels.severity }}
          **Service:** {{ .CommonLabels.service }}
          
          {{ .CommonAnnotations.description }}
          
          **Affected Resources:**
          {{ range .Alerts }}
          - {{ .Labels.endpoint }} ({{ .Labels.tenant_id }})
          {{ end }}
          
          **Time:** {{ .StartsAt | since }}
          
          <{{ .GeneratorURL }}|View in Grafana>
        icon_emoji: ':warning:'
        username: 'Chat App Monitor'
        mention_channel: 'here'
        mention_users: 'U1234567890'

  - name: 'slack_critical'
    slack_configs:
      - channel: '#critical-alerts'
        title: '🚨 CRITICAL: Chat App Alert'
        text: |
          **CRITICAL ALERT:** {{ .CommonLabels.alertname }}
          **Service:** {{ .CommonLabels.service }}
          
          {{ .CommonAnnotations.description }}
          
          **IMMEDIATE ACTION REQUIRED**
          
          **Affected Resources:**
          {{ range .Alerts }}
          - {{ .Labels.endpoint }} ({{ .Labels.tenant_id }})
          {{ end }}
          
          **Time:** {{ .StartsAt | since }}
          
          <{{ .GeneratorURL }}|View in Grafana>
        icon_emoji: ':rotating_light:'
        username: 'Chat App Monitor'
        mention_channel: 'here'
        mention_users: 'U1234567890,U0987654321'

  - name: 'slack_warning'
    slack_configs:
      - channel: '#warnings'
        title: '⚠️ Chat App Warning'
        text: |
          **Warning:** {{ .CommonLabels.alertname }}
          **Service:** {{ .CommonLabels.service }}
          
          {{ .CommonAnnotations.description }}
          
          **Affected Resources:**
          {{ range .Alerts }}
          - {{ .Labels.endpoint }} ({{ .Labels.tenant_id }})
          {{ end }}
          
          **Time:** {{ .StartsAt | since }}
          
          <{{ .GeneratorURL }}|View in Grafana>
        icon_emoji: ':warning:'
        username: 'Chat App Monitor'

  - name: 'email_alerts'
    email_configs:
      - to: 'admin@company.com,ops@company.com'
        subject: 'Chat App Alert: {{ .CommonLabels.alertname }}'
        body: |
          Alert: {{ .CommonLabels.alertname }}
          Severity: {{ .CommonLabels.severity }}
          Service: {{ .CommonLabels.service }}
          
          {{ .CommonAnnotations.description }}
          
          **Affected Resources:**
          {{ range .Alerts }}
          - {{ .Labels.endpoint }} ({{ .Labels.tenant_id }})
          {{ end }}
          
          Time: {{ .StartsAt }}
          Duration: {{ .EndsAt | sub .StartsAt }}
          
          View in Grafana: {{ .GeneratorURL }}

  - name: 'pagerduty_alerts'
    pagerduty_configs:
      - routing_key: 'YOUR_PAGERDUTY_ROUTING_KEY'
        description: '{{ .CommonLabels.alertname }}: {{ .CommonAnnotations.summary }}'
        severity: '{{ if eq .CommonLabels.severity "critical" }}critical{{ else }}warning{{ end }}'
        details:
          firing: '{{ .Alerts.Firing | len }}'
          status: '{{ .Status }}'
          description: '{{ .CommonAnnotations.description }}'
          labels: '{{ .CommonLabels }}'

inhibit_rules:
  # Suprimir warnings quando há alertas críticos para o mesmo tenant/endpoint
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['tenant_id', 'endpoint']
  
  # Suprimir alertas de latência quando há erros críticos
  - source_match:
      alert_type: 'error_rate'
      severity: 'critical'
    target_match:
      alert_type: 'latency'
    equal: ['tenant_id', 'endpoint']

# Configuração de templates
templates:
  - '/etc/alertmanager/template/*.tmpl'

# Configuração de timeouts
time_intervals:
  - name: 'workdays'
    time_intervals:
      - weekdays: ['monday:friday']
        times:
          - start_time: 09:00
            end_time: 17:00
        location: 'America/Sao_Paulo'
  
  - name: 'weekends'
    time_intervals:
      - weekdays: ['saturday', 'sunday']
        times:
          - start_time: 00:00
            end_time: 23:59
        location: 'America/Sao_Paulo'

# Configuração de mute time intervals
mute_time_intervals:
  - name: 'maintenance_window'
    time_intervals:
      - weekdays: ['sunday']
        times:
          - start_time: 02:00
            end_time: 04:00
        location: 'America/Sao_Paulo'
  
  - name: 'holidays'
    time_intervals:
      - months: ['december']
        days_of_month: ['24', '25', '31']
        times:
          - start_time: 00:00
            end_time: 23:59
        location: 'America/Sao_Paulo' 