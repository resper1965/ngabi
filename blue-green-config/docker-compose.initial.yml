version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-bluegreen
    environment:
      POSTGRES_DB: chat_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat_app_network

  redis:
    image: redis:7-alpine
    container_name: redis-bluegreen
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - chat_app_network

  backend-blue:
    image: ghcr.io/ngabi/backend:latest
    container_name: backend-blue
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/chat_app
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=test-openai-key
      - PINECONE_API_KEY=test-pinecone-key
      - JWT_SECRET=test-jwt-secret
      - APP_VERSION=blue
      - APP_PORT=8001
    ports:
      - "8001:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - chat_app_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  proxy:
    image: nginx:alpine
    container_name: proxy-blue-green
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-blue
    networks:
      - chat_app_network
    restart: unless-stopped

networks:
  chat_app_network:
    external: true
