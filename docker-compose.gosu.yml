# Docker Compose Ultra-Seguro com gosu
# n.Gabi - Chat Multi-Agente (Versão Hardened + gosu)

version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.alpine-gosu
    container_name: ngabi-frontend-gosu
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_SUPABASE_URL=${SUPABASE_URL}
      - VITE_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - ngabi-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.alpine-gosu
    container_name: ngabi-backend-gosu
    ports:
      - "8000:8000"
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - REDIS_URL=redis://ngabi-redis-gosu:6379
      - CACHE_ENABLED=true
      - CACHE_TTL=3600
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW=60
    volumes:
      - ./backend:/app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - ngabi-network

  redis:
    image: redis:7-alpine
    container_name: ngabi-redis-gosu
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PASSWORD:-} --maxmemory 256mb --maxmemory-policy allkeys-lru --protected-mode yes --bind 0.0.0.0
    restart: unless-stopped
    networks:
      - ngabi-network

volumes:
  redis_data:
    driver: local

networks:
  ngabi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16 